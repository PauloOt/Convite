<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel — Bruna &amp; Rodrigo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── PIN overlay ── -->
  <div id="pinOverlay" class="page" style="justify-content:center;min-height:100vh">
    <div class="invite-card" style="max-width:300px">
      <p class="admin-title">Painel Administrativo</p>
      <p class="lbl-save">Bruna &amp; Rodrigo</p>

      <label class="pin-label" for="pinInput">Digite o PIN</label>
      <input
        type="password"
        id="pinInput"
        class="pin-input"
        maxlength="6"
        inputmode="numeric"
        autocomplete="off"
        placeholder="····"
      >
      <p class="pin-error" id="pinError">PIN incorreto</p>

      <button class="btn btn-primary" id="pinBtn" style="margin-top:24px;max-width:200px;margin-left:auto;margin-right:auto">
        Entrar
      </button>
    </div>
  </div>

  <!-- ── Admin panel (hidden until PIN unlocked) ── -->
  <div id="adminPanel" class="page admin-page hidden">

    <!-- header -->
    <div class="invite-card">
      <p class="admin-title">Painel de Confirmações</p>
      <p class="lbl-save">Bruna &amp; Rodrigo · 16.01.2027</p>
    </div>

    <!-- counter -->
    <div class="counter-box" style="width:100%;max-width:440px">
      <span class="counter-num" id="totalPeople">0</span>
      <span class="counter-lbl">pessoas confirmadas</span>
    </div>

    <!-- stats -->
    <div class="stats-row">
      <div class="stat-box">
        <span class="stat-num tag-yes" id="countYes">0</span>
        <span>Confirmados</span>
      </div>
      <div class="stat-box">
        <span class="stat-num tag-no" id="countNo">0</span>
        <span>Recusados</span>
      </div>
    </div>

    <!-- RSVP list -->
    <div class="rsvp-list" id="rsvpList" style="max-width:440px;width:100%">
      <div class="empty-state" id="emptyState">Nenhuma resposta ainda.</div>
    </div>

    <!-- logout -->
    <div style="margin-top:40px;text-align:center">
      <button id="logoutBtn" class="back-link" style="background:none;border:none;border-bottom:1px solid #e0d9d0;cursor:pointer">
        Sair
      </button>
    </div>

  </div>

  <script src="admin.js"></script>
</body>
</html>
